name: Build VideoVault Pro EXE

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yt-dlp customtkinter pillow pyinstaller

      - name: Download FFmpeg for Windows
        run: |
          curl -L "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip" -o ffmpeg.zip
          Expand-Archive -Path ffmpeg.zip -DestinationPath ffmpeg_extracted
          $ffmpegBin = Get-ChildItem -Path ffmpeg_extracted -Recurse -Filter "ffmpeg.exe" | Select-Object -First 1
          $ffprobeBin = Get-ChildItem -Path ffmpeg_extracted -Recurse -Filter "ffprobe.exe" | Select-Object -First 1
          Copy-Item $ffmpegBin.FullName -Destination "ffmpeg.exe"
          Copy-Item $ffprobeBin.FullName -Destination "ffprobe.exe"
          echo "FFmpeg downloaded successfully"
          .\ffmpeg.exe -version

      - name: Build EXE with PyInstaller (FFmpeg bundled)
        run: |
          pyinstaller --noconfirm --onedir --windowed `
            --name "GreenDownloader" `
            --collect-all customtkinter `
            --collect-all yt_dlp `
            --add-binary "ffmpeg.exe;." `
            --add-binary "ffprobe.exe;." `
            main.py

      - name: Zip the output
        run: |
          Compress-Archive -Path dist\GreenDownloader\* -DestinationPath GreenDownloader_Windows.zip

      - name: Upload as downloadable file
        uses: actions/upload-artifact@v4
        with:
          name: GreenDownloader-Windows-EXE
          path: GreenDownloader_Windows.zip
          retention-days: 30
